<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1500" viewBox="0 0 1120 1500" role="img" aria-labelledby="title desc">
  <title id="title">Pre-commit workflow flowchart</title>
  <desc id="desc">Flowchart for unit, build, lint, static analysis, commit readiness, pre-push, and CI loops.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #111827; stroke-width: 1.5; }
      .decision { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.5; }
      .line { stroke: #111827; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; text-anchor: middle; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #334155; }
    </style>
  </defs>

  <text x="560" y="32" class="label" style="font-size:18px;">Pre-Commit and Pre-Push Workflow (Executable Spec)</text>

  <rect x="420" y="55" width="280" height="52" rx="8" class="box" />
  <text x="560" y="86" class="label">Start pre-commit checks</text>

  <rect x="420" y="130" width="280" height="52" rx="8" class="box" />
  <text x="560" y="161" class="label">Run unit tests</text>

  <polygon points="560,210 700,262 560,314 420,262" class="decision" />
  <text x="560" y="258" class="label">Unit tests pass?</text>

  <rect x="780" y="232" width="250" height="60" rx="8" class="box" />
  <text x="905" y="259" class="label">Fix failures and</text>
  <text x="905" y="277" class="label">re-run unit tests</text>

  <polygon points="560,340 700,392 560,444 420,392" class="decision" />
  <text x="560" y="388" class="label">Build command</text>
  <text x="560" y="406" class="label">configured?</text>

  <rect x="420" y="470" width="280" height="52" rx="8" class="box" />
  <text x="560" y="501" class="label">Run build</text>

  <polygon points="560,550 700,602 560,654 420,602" class="decision" />
  <text x="560" y="598" class="label">Build succeeds?</text>

  <rect x="780" y="572" width="250" height="60" rx="8" class="box" />
  <text x="905" y="599" class="label">Fix build blockers and</text>
  <text x="905" y="617" class="label">re-run build</text>

  <polygon points="560,680 700,732 560,784 420,732" class="decision" />
  <text x="560" y="728" class="label">Lint command</text>
  <text x="560" y="746" class="label">configured?</text>

  <rect x="420" y="810" width="280" height="52" rx="8" class="box" />
  <text x="560" y="841" class="label">Run lint</text>

  <polygon points="560,890 700,942 560,994 420,942" class="decision" />
  <text x="560" y="938" class="label">Lint passes?</text>

  <rect x="780" y="912" width="250" height="60" rx="8" class="box" />
  <text x="905" y="939" class="label">Fix lint errors and</text>
  <text x="905" y="957" class="label">re-run lint</text>

  <polygon points="560,1020 700,1072 560,1124 420,1072" class="decision" />
  <text x="560" y="1068" class="label">Static analysis</text>
  <text x="560" y="1086" class="label">configured?</text>

  <rect x="420" y="1150" width="280" height="52" rx="8" class="box" />
  <text x="560" y="1181" class="label">Run static analysis</text>

  <polygon points="560,1230 700,1282 560,1334 420,1282" class="decision" />
  <text x="560" y="1278" class="label">Static analysis</text>
  <text x="560" y="1296" class="label">passes?</text>

  <rect x="780" y="1252" width="250" height="60" rx="8" class="box" />
  <text x="905" y="1279" class="label">Fix violations and</text>
  <text x="905" y="1297" class="label">re-run analysis</text>

  <rect x="40" y="620" width="250" height="80" rx="8" class="box" />
  <text x="165" y="650" class="label">NOT READY</text>
  <text x="165" y="668" class="label">List blockers and</text>
  <text x="165" y="686" class="label">return to unit tests</text>

  <rect x="40" y="770" width="250" height="80" rx="8" class="box" />
  <text x="165" y="800" class="label">Commit one logical change</text>
  <text x="165" y="818" class="label">with conventional message</text>

  <rect x="40" y="900" width="250" height="80" rx="8" class="box" />
  <text x="165" y="930" class="label">Before push: run</text>
  <text x="165" y="948" class="label">unit + integration tests</text>

  <polygon points="165,1010 300,1060 165,1110 30,1060" class="decision" />
  <text x="165" y="1056" class="label">Integration</text>
  <text x="165" y="1074" class="label">tests pass?</text>

  <rect x="40" y="1140" width="250" height="80" rx="8" class="box" />
  <text x="165" y="1170" class="label">Push</text>
  <text x="165" y="1188" class="label">changes</text>

  <rect x="40" y="1260" width="250" height="80" rx="8" class="box" />
  <text x="165" y="1290" class="label">CI runs unit + integration</text>
  <text x="165" y="1308" class="label">+ E2E tests</text>

  <polygon points="165,1370 300,1420 165,1470 30,1420" class="decision" />
  <text x="165" y="1416" class="label">CI passes?</text>

  <rect x="320" y="1380" width="250" height="80" rx="8" class="box" />
  <text x="445" y="1410" class="label">Fix CI failures and</text>
  <text x="445" y="1428" class="label">push follow-up</text>

  <rect x="600" y="1380" width="140" height="80" rx="8" class="box" />
  <text x="670" y="1427" class="label">Done</text>

  <line x1="560" y1="107" x2="560" y2="130" class="line" />
  <line x1="560" y1="182" x2="560" y2="210" class="line" />
  <line x1="700" y1="262" x2="780" y2="262" class="line" />
  <text x="740" y="252" class="small">No</text>
  <line x1="905" y1="292" x2="905" y2="324" class="line" />
  <line x1="905" y1="324" x2="560" y2="324" class="line" />
  <line x1="560" y1="324" x2="560" y2="130" class="line" />
  <line x1="560" y1="314" x2="560" y2="340" class="line" />
  <text x="576" y="328" class="small">Yes</text>

  <line x1="560" y1="444" x2="560" y2="470" class="line" />
  <text x="577" y="460" class="small">Yes</text>
  <line x1="560" y1="522" x2="560" y2="550" class="line" />
  <line x1="700" y1="602" x2="780" y2="602" class="line" />
  <text x="740" y="592" class="small">No</text>
  <line x1="905" y1="632" x2="905" y2="664" class="line" />
  <line x1="905" y1="664" x2="560" y2="664" class="line" />
  <line x1="560" y1="664" x2="560" y2="470" class="line" />

  <line x1="560" y1="654" x2="560" y2="680" class="line" />
  <text x="577" y="670" class="small">Yes</text>
  <line x1="560" y1="784" x2="560" y2="810" class="line" />
  <text x="577" y="799" class="small">Yes</text>
  <line x1="560" y1="862" x2="560" y2="890" class="line" />
  <line x1="700" y1="942" x2="780" y2="942" class="line" />
  <text x="740" y="932" class="small">No</text>
  <line x1="905" y1="972" x2="905" y2="1004" class="line" />
  <line x1="905" y1="1004" x2="560" y2="1004" class="line" />
  <line x1="560" y1="1004" x2="560" y2="810" class="line" />

  <line x1="560" y1="994" x2="560" y2="1020" class="line" />
  <text x="577" y="1008" class="small">Yes</text>
  <line x1="560" y1="1124" x2="560" y2="1150" class="line" />
  <text x="577" y="1139" class="small">Yes</text>
  <line x1="560" y1="1202" x2="560" y2="1230" class="line" />
  <line x1="700" y1="1282" x2="780" y2="1282" class="line" />
  <text x="740" y="1272" class="small">No</text>
  <line x1="905" y1="1312" x2="905" y2="1344" class="line" />
  <line x1="905" y1="1344" x2="560" y2="1344" class="line" />
  <line x1="560" y1="1344" x2="560" y2="1150" class="line" />

  <line x1="420" y1="392" x2="290" y2="392" class="line" />
  <text x="332" y="383" class="small">No</text>
  <line x1="290" y1="392" x2="290" y2="660" class="line" />
  <line x1="290" y1="660" x2="40" y2="660" class="line" />

  <line x1="165" y1="700" x2="165" y2="730" class="line" />
  <line x1="165" y1="730" x2="560" y2="730" class="line" />
  <line x1="560" y1="730" x2="560" y2="130" class="line" />

  <line x1="420" y1="1072" x2="290" y2="1072" class="line" />
  <text x="332" y="1063" class="small">No</text>
  <line x1="290" y1="1072" x2="165" y2="1072" class="line" />

  <line x1="560" y1="1334" x2="165" y2="1334" class="line" />
  <line x1="165" y1="1334" x2="165" y2="770" class="line" />
  <text x="360" y="1324" class="small">Yes</text>

  <line x1="165" y1="850" x2="165" y2="900" class="line" />
  <line x1="165" y1="980" x2="165" y2="1010" class="line" />
  <line x1="165" y1="1110" x2="165" y2="1140" class="line" />
  <text x="182" y="1128" class="small">Yes</text>
  <line x1="300" y1="1060" x2="420" y2="1060" class="line" />
  <line x1="420" y1="1060" x2="420" y2="940" class="line" />
  <line x1="420" y1="940" x2="165" y2="940" class="line" />
  <text x="328" y="1050" class="small">No</text>

  <line x1="165" y1="1220" x2="165" y2="1260" class="line" />
  <line x1="165" y1="1340" x2="165" y2="1370" class="line" />
  <line x1="300" y1="1420" x2="320" y2="1420" class="line" />
  <text x="308" y="1410" class="small">No</text>
  <line x1="445" y1="1380" x2="445" y2="1160" class="line" />
  <line x1="445" y1="1160" x2="165" y2="1160" class="line" />
  <line x1="300" y1="1420" x2="600" y2="1420" class="line" />
  <text x="452" y="1410" class="small">Yes</text>
</svg>
