<svg xmlns="http://www.w3.org/2000/svg" width="980" height="1380" viewBox="0 0 980 1380" role="img" aria-labelledby="title desc">
  <title id="title">TDD workflow flowchart</title>
  <desc id="desc">Flowchart for STOP, RED, GREEN, REFACTOR, and COMMIT with blocking loops.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 1.5; }
      .decision { fill: #fff7ed; stroke: #7c2d12; stroke-width: 1.5; }
      .line { stroke: #1f2937; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .label { font-family: Arial, sans-serif; font-size: 13px; fill: #111827; text-anchor: middle; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #334155; }
    </style>
  </defs>

  <text x="490" y="32" class="label" style="font-size:18px;">TDD Workflow (Executable Spec)</text>

  <rect x="350" y="55" width="280" height="52" rx="8" class="box" />
  <text x="490" y="86" class="label">Start TDD cycle</text>

  <rect x="330" y="130" width="320" height="62" rx="8" class="box" />
  <text x="490" y="158" class="label">Select one behavior</text>
  <text x="490" y="176" class="label">for this cycle</text>

  <rect x="330" y="215" width="320" height="62" rx="8" class="box" />
  <text x="490" y="243" class="label">Write exactly one</text>
  <text x="490" y="261" class="label">failing test</text>

  <polygon points="490,305 620,355 490,405 360,355" class="decision" />
  <text x="490" y="351" class="label">Only one new</text>
  <text x="490" y="369" class="label">failing test?</text>

  <rect x="700" y="324" width="220" height="62" rx="8" class="box" />
  <text x="810" y="352" class="label">Split tests, keep one</text>
  <text x="810" y="370" class="label">failing test in cycle</text>

  <rect x="330" y="430" width="320" height="62" rx="8" class="box" />
  <text x="490" y="458" class="label">Run targeted test</text>
  <text x="490" y="476" class="label">(verify RED)</text>

  <polygon points="490,520 620,570 490,620 360,570" class="decision" />
  <text x="490" y="566" class="label">Fails for expected</text>
  <text x="490" y="584" class="label">behavior gap?</text>

  <rect x="700" y="539" width="220" height="62" rx="8" class="box" />
  <text x="810" y="567" class="label">Fix test setup/imports</text>
  <text x="810" y="585" class="label">or assertions</text>

  <rect x="330" y="645" width="320" height="62" rx="8" class="box" />
  <text x="490" y="673" class="label">Implement minimal</text>
  <text x="490" y="691" class="label">production code</text>

  <rect x="330" y="730" width="320" height="62" rx="8" class="box" />
  <text x="490" y="758" class="label">Run unit tests</text>
  <text x="490" y="776" class="label">(verify GREEN)</text>

  <polygon points="490,820 620,870 490,920 360,870" class="decision" />
  <text x="490" y="866" class="label">All unit tests</text>
  <text x="490" y="884" class="label">pass?</text>

  <rect x="700" y="839" width="220" height="62" rx="8" class="box" />
  <text x="810" y="867" class="label">Fix code/test and</text>
  <text x="810" y="885" class="label">re-run unit tests</text>

  <rect x="330" y="945" width="320" height="62" rx="8" class="box" />
  <text x="490" y="973" class="label">Refactor one step</text>
  <text x="490" y="991" class="label">(no behavior change)</text>

  <rect x="330" y="1030" width="320" height="62" rx="8" class="box" />
  <text x="490" y="1058" class="label">Run unit tests</text>
  <text x="490" y="1076" class="label">after refactor</text>

  <polygon points="490,1120 620,1170 490,1220 360,1170" class="decision" />
  <text x="490" y="1166" class="label">Tests still</text>
  <text x="490" y="1184" class="label">pass?</text>

  <rect x="700" y="1139" width="220" height="62" rx="8" class="box" />
  <text x="810" y="1167" class="label">Fix/revert refactor</text>
  <text x="810" y="1185" class="label">and re-run tests</text>

  <rect x="330" y="1245" width="320" height="62" rx="8" class="box" />
  <text x="490" y="1273" class="label">Commit one logical change</text>
  <text x="490" y="1291" class="label">(production-ready)</text>

  <line x1="490" y1="107" x2="490" y2="130" class="line" />
  <line x1="490" y1="192" x2="490" y2="215" class="line" />
  <line x1="490" y1="277" x2="490" y2="305" class="line" />
  <line x1="620" y1="355" x2="700" y2="355" class="line" />
  <text x="650" y="346" class="small">No</text>
  <line x1="810" y1="386" x2="810" y2="418" class="line" />
  <line x1="810" y1="418" x2="490" y2="418" class="line" />
  <line x1="490" y1="418" x2="490" y2="430" class="line" />
  <line x1="490" y1="405" x2="490" y2="430" class="line" />
  <text x="505" y="422" class="small">Yes</text>

  <line x1="490" y1="492" x2="490" y2="520" class="line" />
  <line x1="620" y1="570" x2="700" y2="570" class="line" />
  <text x="650" y="561" class="small">No</text>
  <line x1="810" y1="601" x2="810" y2="635" class="line" />
  <line x1="810" y1="635" x2="490" y2="635" class="line" />
  <line x1="490" y1="635" x2="490" y2="430" class="line" />
  <line x1="490" y1="620" x2="490" y2="645" class="line" />
  <text x="505" y="637" class="small">Yes</text>

  <line x1="490" y1="707" x2="490" y2="730" class="line" />
  <line x1="490" y1="792" x2="490" y2="820" class="line" />
  <line x1="620" y1="870" x2="700" y2="870" class="line" />
  <text x="650" y="861" class="small">No</text>
  <line x1="810" y1="901" x2="810" y2="934" class="line" />
  <line x1="810" y1="934" x2="490" y2="934" class="line" />
  <line x1="490" y1="934" x2="490" y2="730" class="line" />
  <line x1="490" y1="920" x2="490" y2="945" class="line" />
  <text x="505" y="937" class="small">Yes</text>

  <line x1="490" y1="1007" x2="490" y2="1030" class="line" />
  <line x1="490" y1="1092" x2="490" y2="1120" class="line" />
  <line x1="620" y1="1170" x2="700" y2="1170" class="line" />
  <text x="650" y="1161" class="small">No</text>
  <line x1="810" y1="1201" x2="810" y2="1234" class="line" />
  <line x1="810" y1="1234" x2="490" y2="1234" class="line" />
  <line x1="490" y1="1234" x2="490" y2="1030" class="line" />
  <line x1="490" y1="1220" x2="490" y2="1245" class="line" />
  <text x="505" y="1237" class="small">Yes</text>

  <text x="490" y="1338" class="small">Loop: after commit, start next RED cycle for the next behavior.</text>
</svg>
